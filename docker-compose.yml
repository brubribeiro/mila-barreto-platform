version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mila_postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mila}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mila}
      POSTGRES_DB: ${POSTGRES_DB:-mila_platform}
    ports:
      - "5432:5432"
    volumes:
      - mila_pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: mila_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    profiles:
      - dev

volumes:
  mila_pgdata:
